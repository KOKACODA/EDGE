<script type="text/javascript">
// ==================== 语音播放系统 ====================

const audioGo = [];
const audioStop = [];
const audioFinish = [];

// 加载 go 阶段的语音（根据你 go 数组有多少条，就加载多少条）
for (let i = 0; i < 30; i++) {
    const audio = new Audio(`audio/go/go_${i}.wav`);
    audioGo.push(audio);
}

// 加载 stop 阶段的语音
for (let i = 0; i < 25; i++) {
    const audio = new Audio(`audio/stop/stop_${i}.wav`);
    audioStop.push(audio);
}

// 加载 finish 阶段的语音
for (let i = 0; i < 15; i++) {
    const audio = new Audio(`audio/finish/finish_${i}.wav`);
    audioFinish.push(audio);
}

// 播放指定序号的语音
function playVoice(type, index) {
    let audios = [];
    if (type === 'go') audios = audioGo;
    else if (type === 'stop') audios = audioStop;
    else if (type === 'finish') audios = audioFinish;
    else return;

    if (index < 0 || index >= audios.length) return;

    // 停止当前所有正在播放的语音
    audios.forEach(a => {
        a.pause();
        a.currentTime = 0;
    });

    const audio = audios[index];
    audio.currentTime = 0;
    audio.play().catch(err => {
        console.log("语音播放失败:", err);
    });
}
</script>
